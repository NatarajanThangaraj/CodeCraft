<!DOCTYPE html>
<html lang="en">
<head>

<title>CodeCraft – Interactive Coding Skills Trainer</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#1e293b}
::-webkit-scrollbar-thumb{background:#475569;border-radius:3px}

/* animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{0%{transform:scale(0.82);opacity:0}60%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
@keyframes slideIn{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
@keyframes flashGreen{0%,100%{background:#14532d}50%{background:#166534}}
@keyframes flashRed{0%,100%{background:#7f1d1d}50%{background:#991b1b}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

/* textarea resets */
textarea{font-family:'Consolas','Monaco','Courier New',monospace!important;tab-size:4;-moz-tab-size:4}

/* editor line highlight */
.line-changed{background:#1a2e1a}
.line-added  {background:#0d2210}
.line-same   {background:transparent}
</style>
</head>

   ③  UTILITIES
══════════════════════════════════════════════════════════════ */

/** Run all test cases for a problem and return results */
function runTests(code, problem) {
  return problem.testCases.map(tc => {
    const passed = tc.check(code);
    return { name: tc.name, passed, expected: tc.expected, actual: passed ? tc.expected : tc.failMsg };
  });
}

/** Compare original code vs current code line-by-line */
function getDiff(original, current) {
  const oLines = original.split('\n');
  const cLines = current.split('\n');
  const len = Math.max(oLines.length, cLines.length);
  return Array.from({ length: len }, (_, i) => ({
    num: i + 1,
    orig: oLines[i] ?? '',
    curr: cLines[i] ?? '',
    type: i >= oLines.length ? 'added'
        : i >= cLines.length ? 'removed'
        : oLines[i] !== cLines[i] ? 'changed' : 'same',
  }));
}

function countChanges(original, current) {
  return getDiff(original, current).filter(l => l.type !== 'same').length;
}

/* ══════════════════════════════════════════════════════════════
   ④  CODE EDITOR  (textarea + line-numbers + diff highlights)
══════════════════════════════════════════════════════════════ */
function CodeEditor({ code, onChange, originalCode, showDiff, modeColor }) {
  const taRef   = useRef(null);
  const lnRef   = useRef(null);

  // Sync line-number panel scroll with textarea
  useEffect(() => {
    const ta = taRef.current;
    if (!ta) return;
    const sync = () => { if (lnRef.current) lnRef.current.scrollTop = ta.scrollTop; };
    ta.addEventListener('scroll', sync);
    return () => ta.removeEventListener('scroll', sync);
  }, []);

  const lines = code.split('\n');
  const diff  = showDiff ? getDiff(originalCode, code) : null;
  const LINE_H = 21;
  const editorH = Math.min(Math.max(lines.length, 10), 22) * LINE_H + 24;

  // Handle Tab key — insert 4 spaces instead of changing focus
  function handleKeyDown(e) {
    if (e.key !== 'Tab') return;
    e.preventDefault();
    const ta = e.target;
    const s  = ta.selectionStart, end = ta.selectionEnd;
    const next = code.slice(0, s) + '    ' + code.slice(end);
    onChange(next);
    requestAnimationFrame(() => { ta.selectionStart = ta.selectionEnd = s + 4; });
  }

  function lineColor(i) {
    if (!diff) return 'transparent';
    const t = diff[i]?.type;
    if (t === 'changed') return '#1a2e1a';
    if (t === 'added')   return '#0d2210';
    return 'transparent';
  }

  return (
    <div style={{ display:'flex', borderRadius:8, overflow:'hidden', border:'1px solid #334155', background:'#020617', position:'relative' }}>
      {/* Line numbers */}
      <div ref={lnRef} style={{
        width:38, overflowY:'hidden', flexShrink:0,
        background:'#0a0f1a', borderRight:'1px solid #1e293b',
        fontFamily:"'Consolas','Monaco',monospace", fontSize:12,
        lineHeight:LINE_H+'px', color:'#3f4f6a',
        textAlign:'right', paddingRight:6, paddingTop:12, paddingBottom:12,
        height:editorH, userSelect:'none',
      }}>
        {lines.map((_, i) => (
          <div key={i} style={{ background:lineColor(i), height:LINE_H, paddingRight:6 }}>
            {i + 1}
          </div>
        ))}
      </div>

      {/* Diff gutter */}
      {showDiff && diff && (
        <div style={{
          width:6, overflowY:'hidden', flexShrink:0, background:'#020617',
          paddingTop:12, paddingBottom:12, height:editorH,
        }}>
          {diff.map((d, i) => (
            <div key={i} style={{
              height:LINE_H,
              background: d.type==='changed'?'#22c55e': d.type==='added'?'#3b82f6':'transparent',
            }}/>
          ))}
        </div>
      )}

      {/* Textarea */}
      <textarea
        ref={taRef}
        value={code}
        onChange={e => onChange(e.target.value)}
        onKeyDown={handleKeyDown}
        spellCheck={false}
        wrap="off"
        style={{
          flex:1, background:'transparent', border:'none', outline:'none',
          color:'#e2e8f0', fontFamily:"'Consolas','Monaco',monospace",
          fontSize:13, lineHeight:LINE_H+'px',
          padding:'12px 14px', resize:'none',
          height:editorH, overflowY:'auto', overflowX:'auto',
        }}
      />
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   ⑤  HINT PANEL
══════════════════════════════════════════════════════════════ */
function HintPanel({ hints, hintLevel, onReveal, modeColor }) {
  return (
    <div style={{ background:'#0f172a', borderRadius:8, border:'1px solid #334155', overflow:'hidden' }}>
      <div style={{
        padding:'10px 14px', background:'#1e293b',
        display:'flex', alignItems:'center', justifyContent:'space-between',
      }}>
        <span style={{ fontWeight:700, fontSize:13, color:'#e2e8f0' }}>💡 Hints</span>
        <span style={{ fontSize:11, color:'#64748b' }}>{hintLevel} of {hints.length} revealed</span>
      </div>

      {/* Revealed hints */}
      {hints.slice(0, hintLevel).map((h, i) => (
        <div key={i} style={{
          padding:'10px 14px', borderTop:'1px solid #1e293b',
          animation:'slideIn 0.3s both',
          background: i === hintLevel-1 ? '#0d1a0d' : 'transparent',
        }}>
          <div style={{ fontSize:10, color:'#64748b', fontWeight:700, marginBottom:3, textTransform:'uppercase', letterSpacing:1 }}>
            Hint {i+1}
          </div>
          <div style={{ fontSize:13, color:'#d4e8d4', lineHeight:1.6, whiteSpace:'pre-wrap' }}>{h}</div>
        </div>
      ))}

      {/* Show next hint button */}
      {hintLevel < hints.length && (
        <div style={{ padding:'10px 14px', borderTop:'1px solid #1e293b' }}>
          <button onClick={onReveal} style={{
            width:'100%', padding:'8px 0', borderRadius:7,
            background: 'rgba(99,102,241,0.12)', border:'1px solid rgba(99,102,241,0.4)',
            color:'#a5b4fc', fontSize:12, fontWeight:600, cursor:'pointer',
            transition:'all 0.15s',
          }}
          onMouseOver={e=>e.currentTarget.style.background='rgba(99,102,241,0.22)'}
          onMouseOut={e=>e.currentTarget.style.background='rgba(99,102,241,0.12)'}>
            💡 Show Hint {hintLevel + 1}
          </button>
        </div>
      )}

      {hintLevel === hints.length && hintLevel > 0 && (
        <div style={{ padding:'8px 14px', fontSize:11, color:'#64748b', fontStyle:'italic', borderTop:'1px solid #1e293b' }}>
          All hints shown. Keep trying!
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   ⑥  TEST PANEL
══════════════════════════════════════════════════════════════ */
function TestPanel({ results, solved, attempts, modeColor }) {
  if (!results) {
    return (
      <div style={{ background:'#0f172a', borderRadius:8, border:'1px solid #334155', padding:'20px 14px', textAlign:'center' }}>
        <div style={{ fontSize:28, marginBottom:8 }}>▶</div>
        <div style={{ fontSize:13, color:'#64748b' }}>Click <strong style={{color:'#94a3b8'}}>Run Tests</strong> to check your code</div>
      </div>
    );
  }

  const allPassed = results.every(r => r.passed);
  const passCount = results.filter(r => r.passed).length;

  return (
    <div style={{ borderRadius:8, border:`1px solid ${allPassed?'#22c55e':'#334155'}`, overflow:'hidden' }}>
      {/* Header */}
      <div style={{
        padding:'10px 14px', fontWeight:700, fontSize:13,
        background: allPassed ? '#14532d' : '#1e293b',
        color: allPassed ? '#86efac' : '#e2e8f0',
        display:'flex', alignItems:'center', justifyContent:'space-between',
        animation: allPassed ? 'flashGreen 0.6s' : 'none',
      }}>
        <span>{allPassed ? '🎉 All Tests Passed!' : `Tests: ${passCount}/${results.length} passed`}</span>
        {attempts > 0 && <span style={{ fontSize:11, opacity:0.7 }}>Attempts: {attempts}</span>}
      </div>

      {/* Individual results */}
      {results.map((r, i) => (
        <div key={i} style={{
          padding:'10px 14px',
          borderTop: i>0 ? '1px solid #1e293b' : 'none',
          background: r.passed ? '#0c1a0c' : '#1a0c0c',
          animation:'popIn 0.3s both',
        }}>
          <div style={{ display:'flex', alignItems:'flex-start', gap:8 }}>
            <span style={{ fontSize:14, flexShrink:0 }}>{r.passed ? '✅' : '❌'}</span>
            <div style={{ flex:1 }}>
              <div style={{ fontSize:12, fontWeight:700, color: r.passed ? '#86efac' : '#fca5a5', marginBottom:3 }}>
                {r.name}
              </div>
              {!r.passed && (
                <div style={{ fontSize:11, color:'#f87171', fontFamily:'Consolas,monospace', background:'#2a0a0a', borderRadius:4, padding:'4px 8px', marginTop:3 }}>
                  {r.actual}
                </div>
              )}
              {r.passed && (
                <div style={{ fontSize:11, color:'#4ade80', fontFamily:'Consolas,monospace', background:'#0a2210', borderRadius:4, padding:'4px 8px', marginTop:3 }}>
                  Output: {r.expected}
                </div>
              )}
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   ⑦  DIFF VIEW  (before / after comparison)
══════════════════════════════════════════════════════════════ */
function DiffView({ original, current }) {
  const diff = getDiff(original, current);
  const changed = diff.filter(d => d.type !== 'same');
  if (changed.length === 0) {
    return <div style={{ padding:'12px', fontSize:12, color:'#64748b', fontStyle:'italic' }}>No changes yet.</div>;
  }
  return (
    <div style={{ fontFamily:"'Consolas','Monaco',monospace", fontSize:12 }}>
      {diff.map((d, i) => {
        let bg = 'transparent', col = '#475569';
        if (d.type === 'changed') { bg='#1a2e1a'; col='#86efac'; }
        if (d.type === 'added')   { bg='#0d2210'; col='#4ade80'; }
        if (d.type === 'removed') { bg='#2a0a0a'; col='#f87171'; }
        return (
          <div key={i} style={{ display:'flex', background:bg, lineHeight:'20px', minHeight:20 }}>
            <span style={{ width:32, color:'#334155', flexShrink:0, paddingLeft:8, userSelect:'none' }}>{d.num}</span>
            <span style={{ color:'#64748b', width:14, flexShrink:0 }}>
              {d.type==='changed'?' ~': d.type==='added'?' +': d.type==='removed'?' -': ''}
            </span>
            <span style={{ color:col, paddingLeft:4, whiteSpace:'pre', flex:1 }}>
              {d.type === 'removed' ? d.orig : d.curr}
            </span>
          </div>
        );
      })}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   ⑧  PROGRESS TRACKER  (top bar)
══════════════════════════════════════════════════════════════ */
function ProgressBar({ solved, total, mode }) {
  const pct = total > 0 ? Math.round((solved/total)*100) : 0;
  const color = MODES[mode]?.color || '#6366f1';
  return (
    <div style={{ display:'flex', alignItems:'center', gap:10, flex:1 }}>
      <div style={{ flex:1, height:5, background:'#1e293b', borderRadius:3 }}>
        <div style={{ height:5, borderRadius:3, background:color, width:pct+'%', transition:'width 0.4s' }}/>
      </div>
      <span style={{ fontSize:11, color:'#94a3b8', whiteSpace:'nowrap' }}>{solved}/{total} solved</span>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   ⑨  MODE SELECTOR  (landing screen)
══════════════════════════════════════════════════════════════ */
function ModeSelector({ onSelect, completedIds }) {
  const modeKeys = Object.keys(MODES);

  return (
    <div style={{ minHeight:'100vh', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:32 }}>
      {/* Logo */}
      <div style={{ textAlign:'center', marginBottom:40, animation:'fadeUp 0.5s both' }}>
        <div style={{ fontSize:48, marginBottom:8 }}>🛠️</div>
        <h1 style={{
          fontSize:34, fontWeight:900, letterSpacing:'-0.5px',
          background:'linear-gradient(90deg,#818cf8,#38bdf8,#22c55e)',
          WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent',
          marginBottom:8,
        }}>CodeCraft</h1>
        <p style={{ fontSize:15, color:'#64748b', maxWidth:420, lineHeight:1.6 }}>
          Improve your coding skills by fixing bugs, completing partial code, and refactoring — one small step at a time.
        </p>
      </div>

      {/* Mode cards */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fit,minmax(220px,1fr))', gap:18, width:'100%', maxWidth:740 }}>
        {modeKeys.map((key, idx) => {
          const m = MODES[key];
          const mProblems = PROBLEMS.filter(p => p.mode === key);
          const done = mProblems.filter(p => completedIds.has(p.id)).length;
          return (
            <div key={key} onClick={() => onSelect(key)} style={{
              background:'rgba(30,41,59,0.8)', border:`2px solid ${m.color}44`,
              borderRadius:14, padding:'22px 20px', cursor:'pointer',
              backdropFilter:'blur(6px)',
              transition:'transform 0.18s, box-shadow 0.18s',
              animation:`fadeUp 0.4s ${idx*0.1}s both`,
            }}
            onMouseOver={e=>{ e.currentTarget.style.transform='translateY(-4px)'; e.currentTarget.style.boxShadow=`0 12px 28px ${m.color}33`; }}
            onMouseOut={e=>{ e.currentTarget.style.transform='translateY(0)'; e.currentTarget.style.boxShadow='none'; }}
            >
              <div style={{ fontSize:30, marginBottom:10 }}>{m.icon}</div>
              <div style={{ fontSize:17, fontWeight:800, color:'#f1f5f9', marginBottom:5 }}>{m.label}</div>
              <div style={{ fontSize:12, color:'#94a3b8', marginBottom:14, lineHeight:1.5 }}>{m.desc}</div>

              {/* Mini progress */}
              <div style={{ height:3, background:'#1e293b', borderRadius:2, marginBottom:8 }}>
                <div style={{ height:3, borderRadius:2, background:m.color, width:((done/mProblems.length)*100)+'%', transition:'width 0.4s' }}/>
              </div>
              <div style={{ fontSize:11, color:'#64748b', marginBottom:14 }}>{done}/{mProblems.length} completed</div>

              <div style={{
                padding:'8px 16px', borderRadius:8, textAlign:'center',
                background:`linear-gradient(135deg,${m.color}cc,${m.color}88)`,
                color:'#fff', fontSize:13, fontWeight:700,
              }}>
                {done === mProblems.length ? '🔁 Review Mode' : done > 0 ? '▶ Continue' : '▶ Start'}
              </div>
            </div>
          );
        })}
      </div>

      {/* Overall stats */}
      <div style={{ marginTop:32, display:'flex', gap:24, animation:'fadeUp 0.5s 0.3s both' }}>
        {[
          { label:'Total Problems', val:PROBLEMS.length },
          { label:'Completed',      val:completedIds.size },
          { label:'Remaining',      val:PROBLEMS.length - completedIds.size },
        ].map(s => (
          <div key={s.label} style={{ textAlign:'center' }}>
            <div style={{ fontSize:22, fontWeight:800, color:'#818cf8' }}>{s.val}</div>
            <div style={{ fontSize:11, color:'#64748b' }}>{s.label}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   ⑩  PROBLEM VIEW  (main working area)
══════════════════════════════════════════════════════════════ */
function ProblemView({ mode, onBack, completedIds, onComplete }) {
  const modeProblems = useMemo(() => PROBLEMS.filter(p => p.mode === mode), [mode]);
  const m = MODES[mode];

  // Find first unsolved problem, or start at 0
  const firstIdx = useMemo(() => {
    const i = modeProblems.findIndex(p => !completedIds.has(p.id));
    return i === -1 ? 0 : i;
  }, []);

  const [pIdx,      setPIdx]      = useState(firstIdx);
  const [code,      setCode]      = useState('');
  const [hintLevel, setHintLevel] = useState(0);
  const [results,   setResults]   = useState(null);
  const [solved,    setSolved]    = useState(false);
  const [attempts,  setAttempts]  = useState(0);
  const [showDiff,  setShowDiff]  = useState(false);
  const [tab,       setTab]       = useState('tests'); // 'tests' | 'diff'

  const problem = modeProblems[pIdx];

  // Reset state when problem changes
  useEffect(() => {
    setCode(problem.starterCode);
    setHintLevel(0);
    setResults(null);
    setSolved(completedIds.has(problem.id));
    setAttempts(0);
    setShowDiff(false);
    setTab('tests');
  }, [pIdx, problem]);

  function handleRun() {
    setAttempts(a => a + 1);
    const res = runTests(code, problem);
    setResults(res);
    setTab('tests');
    const allPassed = res.every(r => r.passed);
    if (allPassed && !solved) {
      setSolved(true);
      onComplete(problem.id);
    }
    // Auto-show first hint after 3 failed attempts
    if (!allPassed && attempts >= 2 && hintLevel === 0) setHintLevel(1);
  }

  function goNext() {
    if (pIdx < modeProblems.length - 1) setPIdx(i => i + 1);
  }
  function goPrev() {
    if (pIdx > 0) setPIdx(i => i - 1);
  }

  const changedLines = countChanges(problem.starterCode, code);
  const warnLargeEdit = changedLines > 5 && !solved;

  const diffBadgeStyle = (active) => ({
    padding:'4px 10px', borderRadius:6, fontSize:12, fontWeight:600, cursor:'pointer',
    background: active ? '#1e3a5f' : '#1e293b',
    border: active ? '1px solid #3b82f6' : '1px solid #334155',
    color: active ? '#93c5fd' : '#94a3b8',
    transition:'all 0.15s',
  });

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100vh' }}>

      {/* ── Header ── */}
      <div style={{
        display:'flex', alignItems:'center', gap:12, padding:'10px 18px',
        background:'rgba(15,23,42,0.97)', borderBottom:'1px solid #1e293b', flexShrink:0,
      }}>
        <button onClick={onBack} style={{
          padding:'5px 12px', borderRadius:7, border:'1px solid #334155',
          background:'#1e293b', color:'#94a3b8', cursor:'pointer', fontSize:12, fontWeight:600,
        }}>← Back</button>
        <span style={{ fontSize:14, color:m.color, fontWeight:800 }}>{m.icon} {m.label}</span>
        <span style={{ fontSize:12, color:'#64748b' }}>
          Problem {pIdx+1} of {modeProblems.length}: <strong style={{color:'#cbd5e1'}}>{problem.title}</strong>
        </span>
        <div style={{
          padding:'2px 8px', borderRadius:10, fontSize:10, fontWeight:700,
          background: problem.diff==='Easy'?'#d1fae5': problem.diff==='Medium'?'#fef3c7':'#fee2e2',
          color:       problem.diff==='Easy'?'#065f46': problem.diff==='Medium'?'#92400e':'#991b1b',
        }}>{problem.diff}</div>
        <div style={{ flex:1 }}>
          <ProgressBar solved={modeProblems.filter(p=>completedIds.has(p.id)).length} total={modeProblems.length} mode={mode}/>
        </div>
        {solved && <span style={{ fontSize:12, color:'#22c55e', fontWeight:700 }}>✅ Solved!</span>}
      </div>

      {/* ── 3-column body ── */}
      <div style={{ flex:1, display:'grid', gridTemplateColumns:'260px 1fr 320px', overflow:'hidden' }}>

        {/* ── LEFT: Problem panel ── */}
        <div style={{ borderRight:'1px solid #1e293b', overflowY:'auto', padding:16, background:'rgba(15,12,41,0.6)' }}>

          {/* Mode badge */}
          <div style={{
            display:'inline-flex', alignItems:'center', gap:5,
            padding:'4px 10px', borderRadius:20, fontSize:11, fontWeight:700,
            background:m.dim, border:`1px solid ${m.color}55`, color:m.color, marginBottom:12,
          }}>
            {m.icon} {m.label} Mode
          </div>

          {/* Title */}
          <div style={{ fontSize:16, fontWeight:800, color:'#f1f5f9', marginBottom:8, lineHeight:1.3 }}>
            {problem.title}
          </div>

          {/* Description */}
          <div style={{ fontSize:12, color:'#94a3b8', lineHeight:1.7, marginBottom:14, borderLeft:`3px solid ${m.color}`, paddingLeft:10 }}>
            {problem.description}
          </div>

          {/* Task box */}
          <div style={{
            background:'#1e293b', borderRadius:8, padding:'10px 12px',
            border:'1px solid #334155', marginBottom:14,
          }}>
            <div style={{ fontSize:10, color:'#64748b', fontWeight:700, textTransform:'uppercase', letterSpacing:1, marginBottom:4 }}>
              🎯 Your Task
            </div>
            <div style={{ fontSize:13, fontWeight:600, color:m.color, lineHeight:1.5 }}>{problem.task}</div>
          </div>

          {/* Test case list (preview) */}
          <div style={{ fontSize:10, color:'#64748b', fontWeight:700, textTransform:'uppercase', letterSpacing:1, marginBottom:6 }}>
            Tests to Pass
          </div>
          {problem.testCases.map((tc, i) => (
            <div key={i} style={{
              display:'flex', alignItems:'flex-start', gap:6, marginBottom:6,
              padding:'6px 8px', borderRadius:6, background:'#1e293b', border:'1px solid #334155',
            }}>
              <span style={{ fontSize:11 }}>
                {results ? (results[i].passed ? '✅' : '❌') : '⬜'}
              </span>
              <span style={{ fontSize:11, color:'#94a3b8', lineHeight:1.4 }}>{tc.name}</span>
            </div>
          ))}

          {/* Attempts */}
          {attempts > 0 && (
            <div style={{ marginTop:12, fontSize:12, color:'#64748b' }}>
              🔁 Attempts: <strong style={{color:'#94a3b8'}}>{attempts}</strong>
            </div>
          )}

          {/* Navigation */}
          <div style={{ marginTop:16, display:'flex', gap:6 }}>
            <button onClick={goPrev} disabled={pIdx===0} style={{
              flex:1, padding:'7px', borderRadius:7, fontSize:12, fontWeight:600,
              background:'#1e293b', border:'1px solid #334155',
              color: pIdx===0 ? '#334155' : '#94a3b8', cursor: pIdx===0 ? 'default' : 'pointer',
            }}>← Prev</button>
            <button onClick={goNext} disabled={pIdx===modeProblems.length-1} style={{
              flex:1, padding:'7px', borderRadius:7, fontSize:12, fontWeight:600,
              background:'#1e293b', border:'1px solid #334155',
              color: pIdx===modeProblems.length-1 ? '#334155' : '#94a3b8',
              cursor: pIdx===modeProblems.length-1 ? 'default' : 'pointer',
            }}>Next →</button>
          </div>
        </div>

        {/* ── CENTER: Code editor ── */}
        <div style={{ display:'flex', flexDirection:'column', padding:16, background:'#0b1120', overflowY:'auto' }}>

          {/* Editor toolbar */}
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:8 }}>
            <div style={{ fontSize:12, color:'#64748b', fontWeight:600 }}>
              📝 Code Editor
              {warnLargeEdit && (
                <span style={{ marginLeft:10, color:'#f59e0b', fontSize:11 }}>
                  ⚠️ {changedLines} lines changed — try smaller steps!
                </span>
              )}
            </div>
            <div style={{ display:'flex', gap:6 }}>
              <button onClick={() => { setShowDiff(s=>!s); setTab('diff'); }}
                style={diffBadgeStyle(showDiff)}>
                {showDiff ? '↔ Hide Diff' : '↔ Show Diff'}
              </button>
              <button onClick={() => { setCode(problem.starterCode); setResults(null); setSolved(false); }}
                style={{ padding:'4px 10px', borderRadius:6, fontSize:12, fontWeight:600, cursor:'pointer',
                  background:'#1e293b', border:'1px solid #334155', color:'#94a3b8' }}>
                ↺ Reset
              </button>
            </div>
          </div>

          {/* Editor */}
          <CodeEditor code={code} onChange={setCode} originalCode={problem.starterCode} showDiff={showDiff} modeColor={m.color}/>

          {/* Diff panel */}
          {showDiff && (
            <div style={{
              marginTop:10, borderRadius:8, border:'1px solid #334155',
              background:'#020617', overflow:'hidden',
            }}>
              <div style={{ padding:'8px 12px', background:'#0f172a', borderBottom:'1px solid #1e293b', fontSize:11, color:'#64748b', fontWeight:700, textTransform:'uppercase', letterSpacing:1 }}>
                ↔ Diff — Changes from starter
              </div>
              <div style={{ padding:'8px 0', maxHeight:160, overflowY:'auto' }}>
                <DiffView original={problem.starterCode} current={code}/>
              </div>
            </div>
          )}

          {/* Action buttons */}
          <div style={{ display:'flex', gap:8, marginTop:12, flexWrap:'wrap' }}>
            <button onClick={handleRun} style={{
              padding:'9px 20px', borderRadius:8, fontWeight:700, fontSize:13, cursor:'pointer',
              background:`linear-gradient(135deg,${m.color}cc,${m.color}99)`,
              border:'none', color:'#fff', transition:'opacity 0.15s',
            }}
            onMouseOver={e=>e.currentTarget.style.opacity='0.85'}
            onMouseOut={e=>e.currentTarget.style.opacity='1'}>
              ▶ Run Tests
            </button>

            {solved && pIdx < modeProblems.length - 1 && (
              <button onClick={goNext} style={{
                padding:'9px 20px', borderRadius:8, fontWeight:700, fontSize:13, cursor:'pointer',
                background:'linear-gradient(135deg,#22c55ecc,#16a34acc)',
                border:'none', color:'#fff',
              }}>
                Next Problem →
              </button>
            )}

            {solved && pIdx === modeProblems.length - 1 && (
              <button onClick={onBack} style={{
                padding:'9px 20px', borderRadius:8, fontWeight:700, fontSize:13, cursor:'pointer',
                background:'linear-gradient(135deg,#6366f1cc,#4f46e5cc)',
                border:'none', color:'#fff',
              }}>
                🏁 All Done — Back to Menu
              </button>
            )}
          </div>
        </div>

        {/* ── RIGHT: Tests + Hints ── */}
        <div style={{ borderLeft:'1px solid #1e293b', overflowY:'auto', padding:16, background:'rgba(15,12,41,0.6)', display:'flex', flexDirection:'column', gap:14 }}>

          {/* Tab switcher */}
          <div style={{ display:'flex', gap:1, background:'#1e293b', borderRadius:8, padding:3 }}>
            {['tests','hints'].map(t => (
              <button key={t} onClick={()=>setTab(t)} style={{
                flex:1, padding:'6px', borderRadius:6, fontSize:12, fontWeight:600, cursor:'pointer', border:'none',
                background: tab===t ? '#334155' : 'transparent',
                color: tab===t ? '#e2e8f0' : '#64748b', transition:'all 0.15s',
              }}>
                {t==='tests' ? '🧪 Tests' : '💡 Hints'}
              </button>
            ))}
          </div>

          {tab === 'tests' && (
            <TestPanel results={results} solved={solved} attempts={attempts} modeColor={m.color}/>
          )}

          {tab === 'hints' && (
            <HintPanel hints={problem.hints} hintLevel={hintLevel} onReveal={()=>setHintLevel(l=>Math.min(l+1, problem.hints.length))} modeColor={m.color}/>
          )}

          {/* Solved celebration */}
          {solved && (
            <div style={{
              background:'#0c1a0c', border:'1px solid #22c55e', borderRadius:8,
              padding:'14px', textAlign:'center', animation:'popIn 0.5s both',
            }}>
              <div style={{ fontSize:32 }}>🎉</div>
              <div style={{ fontSize:14, fontWeight:800, color:'#22c55e', marginTop:6 }}>Problem Solved!</div>
              <div style={{ fontSize:11, color:'#64748b', marginTop:4 }}>
                {attempts} attempt{attempts!==1?'s':''}  •  {hintLevel} hint{hintLevel!==1?'s':''} used
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   ⑪  ROOT APP
══════════════════════════════════════════════════════════════ */
function App() {
  const [screen,       setScreen]       = useState('menu');  // 'menu' | 'problem'
  const [activeMode,   setActiveMode]   = useState(null);
  const [completedIds, setCompletedIds] = useState(new Set());

  function handleSelectMode(mode) {
    setActiveMode(mode);
    setScreen('problem');
  }

  function handleComplete(id) {
    setCompletedIds(prev => new Set([...prev, id]));
  }

  if (screen === 'problem' && activeMode) {
    return (
      <ProblemView
        key={activeMode}
        mode={activeMode}
        onBack={() => setScreen('menu')}
        completedIds={completedIds}
        onComplete={handleComplete}
      />
    );
  }

  return <ModeSelector onSelect={handleSelectMode} completedIds={completedIds}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
